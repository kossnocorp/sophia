#region Base -------------------------------------------------------------------

icon.foreground: "#7A7A7A"

#endregion

#region Title bar --------------------------------------------------------------

titleBar.activeBackground: "#000000"

#endregion

#region Activity bar -----------------------------------------------------------

activityBar.border: "#303030"
