#region Title bar --------------------------------------------------------------

titleBar.activeBackground: "#000000"

#endregion

#region Activity bar -----------------------------------------------------------

activityBar.border: "#303030"
activityBar.activeBackground: "#000000"

activityBar.background: "#000000"
activityBar.foreground: "#bebeb1"

activityBar.activeBorder: "#FFFF00"

activityBarBadge.background: "#FFFF00"
activityBarBadge.foreground: "#000000"

#endregion

#region Sidebar ---------------------------------------------------------------

sideBar.border: "#303030"
sideBar.background: "#000000"
sideBar.foreground: "#bebeb1"

#endregion

#region Statusbar --------------------------------------------------------------

statusBar.background: "#000000"
statusBar.border: "#303030"
statusBar.foreground: "#4d4d4d"

# WSL label remote connection etc.
statusBarItem.remoteBackground: "#000000"
statusBarItem.remoteForeground: "#BBE1CA"

#endregion

#region File tree --------------------------------------------------------------

tree.indentGuidesStroke: "#202020"

#endregion

#region Menu -------------------------------------------------------------------

menu.background: "#171717"

#endregion

#region Tabs -------------------------------------------------------------------

# Base
tab.border: "#000000"

# Active focused
tab.activeBackground: "#31000E"
tab.activeForeground: "#ffffff"
tab.activeBorderTop: "#FF004C"

# Active unfocused
tab.unfocusedActiveBackground: "#000000"
tab.unfocusedActiveForeground: "#bebeb1"
tab.unfocusedActiveBorderTop: "#450015"

# Inactive
tab.inactiveBackground: "#000000"
tab.inactiveForeground: "#bebeb1"

#endregion

#region Editor group -----------------------------------------------------------

editorGroup.border: "#141414"
editorGroupHeader.border: "#000000"
editorGroupHeader.noTabsBackground: "#000000"
editorGroupHeader.tabsBackground: "#000000"

#endregion

#region Editor -----------------------------------------------------------------

editor.background: "#000000"
editor.foreground: "#7e7e7e"

editorLineNumber.foreground: "#4d4d4d"

# Current line
editor.lineHighlightBackground: "#0f0f0f"
# editorRuler.foreground: "#ff0000"
editorIndentGuide.background1: "#101010"
editorIndentGuide.activeBackground1: "#252525"

editorRuler.foreground: "#101010"

# Folds
editor.foldBackground: "#0f0f0f7b"

# Bracket pairs
editorBracketHighlight.foreground1: "#290014"
editorBracketHighlight.foreground2: "#002017"
editorBracketHighlight.foreground3: "#00153c"
editorBracketHighlight.foreground4: "#290014"
editorBracketHighlight.foreground5: "#002017"
editorBracketHighlight.foreground6: "#00153c"

# Inlay hints
editorInlayHint.foreground: "#565656" # runtime.detail
# editorInlayHint.parameterForeground: "#ff0000"
editorInlayHint.typeForeground: "#445047" # types.detail

#endregion

#region Terminal ---------------------------------------------------------------

terminal.background: "#000000"

terminal.tab.activeBorder: "#8904e8bc"

#endregion