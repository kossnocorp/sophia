gitDecoration.modifiedResourceForeground: "#91AFFF"
gitDecoration.stageModifiedResourceForeground: "#A2B2DF"
gitDecoration.addedResourceForeground: "#A1D2A4"
gitDecoration.deletedResourceForeground: "#DCB09A"

#endregion