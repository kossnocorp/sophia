breadcrumb.foreground: "#7A7A7A"
# breadcrumb.background: "#000000"
# breadcrumb.focusForeground: "#00ff00"
# breadcrumb.activeSelectionForeground: "#0000ff"
# breadcrumbPicker.background: "#257CFF"

#endregion

